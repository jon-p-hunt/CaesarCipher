// Top-level build file.
// Repository and plugin management is handled in settings.gradle (AGP 8.x style).
// Do NOT add allprojects { repositories {} } here — it conflicts with
// dependencyResolutionManagement.repositoriesMode = FAIL_ON_PROJECT_REPOS.

plugins {
    id 'com.android.application' version '8.3.2' apply false
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}
